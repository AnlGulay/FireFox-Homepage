<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-main: #1d1d1f;
            --text-secondary: #6e6e73;
            --widget-bg: rgba(255, 255, 255, 0.75);
            --border-color: rgba(255, 255, 255, 0.4);
            --error-color: #ff3b30;
            --icon-stroke: #1d1d1f;
            --widget-width: 220px;
            --row-height: 60px;
            --accent-color: #007aff;
        }

        body {
            background: linear-gradient(135deg, #f6f8fb 0%, #e9ecef 100%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden; padding: 20px; box-sizing: border-box;
        }

        /* Layout */
        .top-bar { position: absolute; top: 40px; left: 40px; right: 40px; display: flex; justify-content: space-between; z-index: 5; }
        .sidebar-left { position: absolute; top: 170px; left: 40px; display: flex; flex-direction: column; gap: 12px; z-index: 5; }
        .sidebar-right { position: absolute; top: 170px; right: 40px; display: flex; flex-direction: column; gap: 12px; z-index: 5; }

        .widget-card, .side-link, .input-card {
            background: var(--widget-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            width: var(--widget-width);
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .widget-card { padding: 20px 24px; display: flex; align-items: center; gap: 16px; height: 95px; }

        .side-link { 
            height: var(--row-height); display: flex; align-items: center; padding: 0 20px; gap: 15px; 
            text-decoration: none; cursor: pointer; position: relative;
        }
        .side-link:hover { transform: scale(1.02); background: #fff; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05); }
        .side-link span { font-size: 14px; font-weight: 500; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .delete-btn {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            width: 20px; height: 20px; background: rgba(255, 59, 48, 0.1); color: var(--error-color);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 14px; opacity: 0; transition: 0.2s; font-weight: bold;
        }
        .side-link:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: var(--error-color); color: #fff; }

        .input-card { height: var(--row-height); padding: 0 20px; display: flex; align-items: center; border-style: dashed; border-width: 1.5px; }
        .input-card:focus-within { z-index: 100; transform: scale(1.05); background: #fff; border-style: solid; border-color: var(--accent-color); box-shadow: 0 20px 40px rgba(0,0,0,0.12); }
        .input-card input { background: transparent; border: none; outline: none; width: 100%; font-size: 14px; color: var(--text-main); font-family: inherit; }

        input:focus::placeholder { color: transparent !important; }

        #site-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; padding: 25px; border-radius: 25px; box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            z-index: 1000; width: 300px; flex-direction: column; gap: 15px;
        }
        #site-modal input { padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 14px; }
        #site-modal button { padding: 12px; border-radius: 12px; border: none; background: var(--accent-color); color: #fff; cursor: pointer; font-weight: 600; }

        .main-content { text-align: center; z-index: 10; width: 100%; max-width: 600px; }
        #clock { font-size: clamp(80px, 15vw, 130px); font-weight: 200; letter-spacing: -6px; margin: 10px 0 30px 0; font-variant-numeric: tabular-nums; }
        .search-box input { width: 100%; max-width: 480px; padding: 18px 30px; border-radius: 50px; border: 1px solid var(--border-color); background: var(--widget-bg); text-align: center; font-size: 17px; outline: none; transition: 0.4s cubic-bezier(0.25, 1, 0.5, 1); box-sizing: border-box; }
        .search-box input:focus { max-width: 540px; background: #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.1); transform: scale(1.02); z-index: 100; }
        
        .logo-img { width: 24px; height: 24px; object-fit: contain; flex-shrink: 0; border-radius: 4px; }
        .icon-svg { stroke: var(--icon-stroke); stroke-width: 1.5; fill: none; width: 34px; height: 34px; stroke-linecap: round; stroke-linejoin: round; }

        @media (max-width: 1100px) {
            .top-bar, .sidebar-left, .sidebar-right { position: static; width: 100%; max-width: 540px; justify-content: center; margin-bottom: 20px; }
            .sidebar-left, .sidebar-right { flex-direction: row; flex-wrap: wrap; }
            body { justify-content: flex-start; overflow-y: auto; padding-top: 40px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="widget-card">
            <svg class="icon-svg" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <div>
                <div style="display:flex; align-items:baseline; gap:4px;"><span id="date-main" class="date-main">--</span><span style="color:var(--text-secondary); font-size:15px;" id="date-secondary">...</span></div>
                <span id="date-day" style="font-size:13px; color:var(--text-secondary); font-weight:500;">...</span>
            </div>
        </div>
        <div class="widget-card">
            <div id="weather-icon-container"><svg class="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle></svg></div>
            <div>
                <div style="display:flex; align-items:baseline; gap:4px;"><span id="temp" class="weather-degree">--</span><span style="color:var(--text-secondary); font-size:15px;">°C</span></div>
                <span id="weather-subtext" style="font-size:13px; color:var(--text-secondary); font-weight:500;">Loading...</span>
            </div>
        </div>
    </div>

    <div class="sidebar-left" id="sites-container">
        <div class="input-card" onclick="openSiteModal()" style="cursor:pointer; border-style:dashed; justify-content:center; color:var(--accent-color); font-weight:bold; font-size:20px;">+</div>
    </div>

    <div class="sidebar-right">
        <div class="input-card"><input type="text" id="todo-input" placeholder="+ Add a task" autocomplete="off"></div>
        <div id="todo-list-container" style="display: flex; flex-direction: column; gap: 12px; width: 100%; align-items: center;"></div>
    </div>

    <div id="site-modal">
        <h3 style="margin:0; font-size:16px;">New Site</h3>
        <input type="text" id="site-name" placeholder="Name">
        <input type="text" id="site-url" placeholder="URL">
        <button onclick="saveNewSite()">Add</button>
        <button onclick="closeSiteModal()" style="background:#eee; color:#333; margin-top:-5px;">Cancel</button>
    </div>

    <div class="main-content">
        <div id="greeting">Hello</div>
        <div id="clock">00:00</div>
        <div class="search-box">
            <form action="https://www.google.com/search" method="get">
                <input type="text" id="main-search" name="q" placeholder="Search the web..." autocomplete="off" autofocus>
            </form>
        </div>
    </div>

    <script>
        function updateDashboard() {
            const now = new Date();
            document.getElementById('clock').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            const h = now.getHours();
            document.getElementById('greeting').textContent = h < 12 ? "Good Morning" : h < 18 ? "Good Afternoon" : "Good Evening";
            document.getElementById('date-main').textContent = now.getDate();
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            document.getElementById('date-secondary').textContent = months[now.getMonth()];
            document.getElementById('date-day').textContent = days[now.getDay()];
        }

        // --- Arama Çubuğuna Zorla Odaklanma ---
        function forceFocusSearch() {
            const searchInput = document.getElementById('main-search');
            if (searchInput) {
                // 50ms gecikme Firefox'un adres çubuğu odağını çalmasını engeller
                setTimeout(() => {
                    searchInput.focus();
                    // Metin varsa imleci sona atar
                    const val = searchInput.value;
                    searchInput.value = '';
                    searchInput.value = val;
                }, 50); 
            }
        }

        // --- Sites ---
        let mySites = JSON.parse(localStorage.getItem('my-sites')) || [
            { name: "YouTube", url: "https://www.youtube.com" },
            { name: "Gemini", url: "https://gemini.google.com" }
        ];

        function renderSites() {
            const container = document.getElementById('sites-container');
            const addButton = container.querySelector('.input-card');
            container.innerHTML = '';
            container.appendChild(addButton);

            mySites.forEach((site, index) => {
                const siteEl = document.createElement('div');
                siteEl.className = 'side-link';
                const iconUrl = `https://www.google.com/s2/favicons?domain=${site.url}&sz=64`;
                siteEl.innerHTML = `
                    <a href="${site.url}" target="_self" style="text-decoration:none; display:flex; align-items:center; gap:15px; width:100%;">
                        <img src="${iconUrl}" class="logo-img">
                        <span>${site.name}</span>
                    </a>
                    <div class="delete-btn" onclick="deleteSite(${index}, event)">×</div>
                `;
                container.insertBefore(siteEl, addButton);
            });
        }

        function deleteSite(index, e) {
            e.stopPropagation(); e.preventDefault();
            mySites.splice(index, 1);
            localStorage.setItem('my-sites', JSON.stringify(mySites));
            renderSites();
        }

        function openSiteModal() { document.getElementById('site-modal').style.display = 'flex'; }
        function closeSiteModal() { document.getElementById('site-modal').style.display = 'none'; }
        function saveNewSite() {
            const name = document.getElementById('site-name').value;
            let url = document.getElementById('site-url').value;
            if(!url.startsWith('http')) url = 'https://' + url;
            if(name && url) {
                mySites.push({ name, url });
                localStorage.setItem('my-sites', JSON.stringify(mySites));
                renderSites(); closeSiteModal();
                document.getElementById('site-name').value = '';
                document.getElementById('site-url').value = '';
            }
        }

        // --- To-Do ---
        function addTask(text) {
            const div = document.createElement('div');
            div.className = 'side-link'; div.style.width = "100%"; div.style.maxWidth = "260px";
            div.innerHTML = `<div style="width:12px; height:12px; border-radius:50%; border:2px solid #007aff;"></div><span>${text}</span>`;
            div.onclick = () => { div.style.opacity = '0'; setTimeout(() => { div.remove(); saveTasks(); }, 300); };
            document.getElementById('todo-list-container').appendChild(div);
            saveTasks();
        }

        function saveTasks() {
            const tasks = Array.from(document.querySelectorAll('#todo-list-container span')).map(s => s.innerText);
            localStorage.setItem('dashboard-todos', JSON.stringify(tasks));
        }

        document.getElementById('todo-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== "") {
                if (document.querySelectorAll('#todo-list-container .side-link').length >= 5) return;
                addTask(e.target.value.trim());
                e.target.value = "";
            }
        });

        // --- Weather ---
        async function fetchWeather() {
            try {
                const response = await fetch('https://wttr.in/Istanbul?format=j1');
                const data = await response.json();
                const current = data.current_condition[0];
                document.getElementById('temp').textContent = current.temp_C;
                document.getElementById('weather-subtext').textContent = `Istanbul, ${current.weatherDesc[0].value}`;
                document.getElementById('weather-icon-container').innerHTML = getWeatherIcon(current.weatherCode);
            } catch (err) { document.getElementById('weather-subtext').textContent = "Offline"; }
        }

        function getWeatherIcon(code) {
            const icons = {
                sun: `<svg class="icon-svg" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>`,
                cloud: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.1-3.9-4.4-.7-3.4-3.7-6.1-7.1-6.1-3.1 0-5.8 2.1-6.7 5C2.1 9.7 1 11.2 1 13c0 2.2 1.8 4 4 4"></path></svg>`,
                rain: `<svg class="icon-svg" viewBox="0 0 24 24"><path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.7-4.1-3.9-4.4-.7-3.4-3.7-6.1-7.1-6.1-3.1 0-5.8 2.1-6.7 5C2.1 9.7 1 11.2 1 13c0 2.2 1.8 4 4 4"></path><path d="M8 13v2M12 13v2M16 13v2"></path></svg>`
            };
            const cloudCodes = ["116", "119", "122", "143", "248", "260"];
            const rainCodes = ["176", "263", "266", "293", "296", "299", "302", "305", "308", "353", "356", "359"];
            if (cloudCodes.includes(code)) return icons.cloud;
            if (rainCodes.includes(code)) return icons.rain;
            return icons.sun;
        }

        // --- Başlatıcılar ---
        setInterval(updateDashboard, 1000);
        updateDashboard();
        renderSites();
        fetchWeather();
        
        const savedTodos = JSON.parse(localStorage.getItem('dashboard-todos') || "[]");
        savedTodos.forEach(addTask);

        // Hem yüklenmede hem de görünürlük değişiminde odağı zorla
        window.onload = forceFocusSearch;
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') forceFocusSearch();
        });
    </script>
</body>
</html>
